name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Install Node.js dependencies
        run: npm ci

      - name: Verify signing key is configured
        run: |
          if [ -z "${{ env.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY 未设置，请在 GitHub 仓库 Settings > Secrets and variables > Actions 中添加"
            echo "::error::命令: gh secret set TAURI_SIGNING_PRIVATE_KEY < ~/.tauri/docagent.key"
            exit 1
          fi
          echo "Signing key 已配置"
        shell: bash

      - name: Build Tauri application (NSIS + updater artifacts)
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List build artifacts
        run: |
          echo "=== NSIS 打包产物 ==="
          dir "src-tauri\target\release\bundle\nsis\"
        shell: pwsh

      - name: Upload artifacts to draft release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*
